<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibehub | Link Your Mind</title>
    <meta name="description" content="Futuristic social media platform for linking like-minded vibes.">
    <link rel="icon" href="https://i.ibb.co/Fqnj3JKp/1000001392.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#9d50bb;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ff9d00;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- PWA -->
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<!-- Loading Screen -->
<div id="loading-screen">
    <div class="starfield" id="starfield"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="loading-content">
        <div class="particle-orbit"></div>
        <div class="particle-orbit orbit-2"></div>
        <div class="particle-orbit orbit-3"></div>
        <div class="loading-brain">
            <svg class="brain-svg" viewBox="0 0 100 100">
                <path class="brain-outline" d="M50 10 C30 10 20 25 20 40 C20 50 30 60 35 65 C30 70 25 80 25 90 C25 98 32 100 40 100 C48 100 55 95 58 88 C60 95 65 100 72 100 C80 100 85 95 85 85 C85 75 80 65 75 60 C80 55 80 45 75 35 C72 28 65 25 60 25 C58 20 55 15 50 10 Z"/>
                <path class="brain-outline" d="M50 10 L50 25"/>
                <circle class="brain-cell" cx="35" cy="55" r="4"/>
                <circle class="brain-cell" cx="65" cy="55" r="4"/>
                <circle class="brain-cell" cx="50" cy="75" r="4"/>
                <circle class="brain-cell" cx="40" cy="85" r="4"/>
                <circle class="brain-cell" cx="60" cy="85" r="4"/>
                <path class="neural-line" d="M35 55 L50 40"/>
                <path class="neural-line" d="M65 55 L50 40"/>
                <path class="neural-line" d="M50 40 L50 75"/>
                <path class="neural-line" d="M35 55 L40 85"/>
                <path class="neural-line" d="M65 55 L60 85"/>
            </svg>
        </div>
        <div class="logo-container">
            <img src="https://i.ibb.co/Fqnj3JKp/1000001392.png" class="loading-logo">
        </div>
        <div class="loading-text">
            <p class="loading-stage">Initializing Neural Link...</p>
            <p class="loading-progress">Loading Consciousness</p>
        </div>
        <div class="lightning-container">
            <div class="lightning-bolt bolt-1"></div>
            <div class="lightning-bolt bolt-2"></div>
            <div class="lightning-bolt bolt-3"></div>
            <div class="lightning-bolt bolt-4"></div>
        </div>
    </div>
    <div class="particles-container" id="loading-particles"></div>
</div>

<!-- Login Particles -->
<div id="login-particles"></div>

<!-- Login Screen -->
<div id="login-screen" style="opacity: 0; visibility: hidden;">
    <div class="login-content glass-panel" style="border: 2px solid rgba(157, 80, 187, 0.3); box-shadow: 0 0 50px rgba(157, 80, 187, 0.2);">
        <div class="login-header">
            <div class="login-logo">
                <div class="login-logo-glow"></div>
                <img src="https://i.ibb.co/Fqnj3JKp/1000001392.png" alt="Vibehub Logo">
            </div>
            <h1 class="login-title">Vibehub</h1>
            <p class="login-subtitle">Link Your Mind</p>
        </div>

        <div class="login-form">
            <div class="login-toggle">
                <input type="checkbox" id="admin-toggle">
                <label for="admin-toggle">I am an Admin</label>
            </div>

            <input type="email" id="login-email" class="login-input" placeholder="Email Address" required>
            <input type="password" id="login-password" class="login-input" placeholder="Password" required>
            <button class="login-submit" onclick="window.App.handleLogin()">
                <span>✨</span> Enter The Pulse
            </button>

            <div class="login-footer">
                <a href="#" onclick="window.App.navigate('register')">Need an account? Register</a>
            </div>
        </div>
    </div>
</div>

    <!-- App Shell -->
    <div id="app" class="hidden">
        <!-- Main Navigation (Mobile Bottom / Desktop Sidebar) -->
        <nav id="main-nav" class="glass-panel">
            <div class="nav-logo desktop-only">
                <img src="https://i.ibb.co/Fqnj3JKp/1000001392.png" alt="Vibehub">
                <span>Vibehub</span>
            </div>
            <div class="nav-links">
                <button class="nav-link active" data-view="home" title="Home">
                    <span class="icon">🏠</span><span class="label">Home</span>
                </button>
                <button class="nav-link" data-view="vibestream" title="VibeStream">
                    <span class="icon">📺</span><span class="label">VibeStream</span>
                </button>
                <button class="nav-link" data-view="syncrooms" title="Sync Rooms">
                    <span class="icon">💬</span><span class="label">Sync Rooms</span>
                </button>
                <button class="nav-link" data-view="communities" title="Communities">
                    <span class="icon">👥</span><span class="label">Communities</span>
                </button>
                <button class="nav-link desktop-only" data-view="search" title="Search">
                    <span class="icon">🔍</span><span class="label">Search</span>
                </button>
                <button class="nav-link" data-view="notifications" title="Notifications">
                    <span class="icon">🔔</span><span class="label">Alerts</span>
                    <span class="badge hidden" id="notif-badge">0</span>
                </button>
                <button class="nav-link" data-view="messages" title="Messages">
                    <span class="icon">✉️</span><span class="label">Messages</span>
                </button>
                <button class="nav-link" data-view="profile" title="Profile">
                    <span class="icon">👤</span><span class="label">Profile</span>
                </button>
                <button class="nav-link desktop-only" data-view="settings" title="Settings">
                    <span class="icon">⚙️</span><span class="label">Settings</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="content-area">
            <header id="top-bar" class="glass-panel">
                <div class="search-container">
                    <input type="text" placeholder="Search vibes, minds, hashtags..." id="global-search">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="top-actions">
                    <button id="create-post-btn" class="btn-primary"><span>+</span> Post</button>
                </div>
            </header>

            <div id="view-container">
                <!-- Views will be injected here -->
            </div>
        </main>

        <!-- Admin Entry (Hidden/Small in Footer area) -->
        <footer id="app-footer">
            <button id="admin-trigger" title="Admin Access">🔑</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden">
        <div class="modal-backdrop"></div>
        <div id="modal-content" class="glass-panel"></div>
    </div>

    <!-- Scripts -->
    <script src="app.js" type="module"></script>
</body>
</html>
