    <!-- Clerk SDK -->
    <script>
    window.CLERK_PUBLISHABLE_KEY = 'pk_test_Z29yZ2VvdXMtb2NlbG90LTg1LmNsZXJrLmFjY291bnRzLmRldiQ';
    
    (async function() {
        // Wait for Clerk SDK to load
        function waitForClerk() {
            return new Promise((resolve) => {
                if (window.Clerk) {
                    resolve();
                } else {
                    const check = setInterval(() => {
                        if (window.Clerk) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                    // Timeout after 10 seconds
                    setTimeout(() => {
                        clearInterval(check);
                        resolve();
                    }, 10000);
                }
            });
        }
        
        // Load Clerk SDK
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.umd.min.js';
        document.head.appendChild(s);
        
        await waitForClerk();
        
        if (window.Clerk) {
            try {
                window.clerk = await window.Clerk.init({
                    publishableKey: window.CLERK_PUBLISHABLE_KEY
                });
                await window.clerk.load();
                window.clerkReady = true;
                console.log('✅ Clerk initialized and ready');
                
                // Listen for session changes
                window.clerk.addListener('session', (session) => {
                    console.log('Session changed:', session);
                    if (session) {
                        window.dispatchEvent(new CustomEvent('clerk-session-change', { detail: session }));
                    }
                });
                
                window.clerk.addListener('user', (user) => {
                    console.log('User changed:', user);
                    if (user) {
                        window.dispatchEvent(new CustomEvent('clerk-user-change', { detail: user }));
                    }
                });
                
            } catch (e) {
                console.error('Clerk init failed:', e);
            }
        }
    })();
    </script>
