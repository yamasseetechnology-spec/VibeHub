<!DOCTYPE html>
<html>
<head>
    <title>VibeHub Admin Merge Tool</title>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'DM Sans', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(157, 80, 187, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #ff9f00; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #ff9f00, #ff6b00);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
        }
        .btn:hover { opacity: 0.9; }
        .log {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            color: #aaa;
        }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .info { color: #ff9f00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 VibeHub Admin Merge Tool</h1>
        <p>This will merge KingKool23 and yamasseetechnology@gmail.com accounts</p>
        <button class="btn" onclick="runMerge()">Run Account Merge</button>
        <div id="log" class="log">Ready to merge...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://osfqlabtuqpynqcdmwff.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZnFsYWJ0dXFweW5xY2Rtd2ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5ODQ3OTEsImV4cCI6MjA4NzU2MDc5MX0.LXZ-lbLiarXHSSlu8NXi0c_uvIVFxh8mw6amXGJAwtA';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function runMerge() {
            log('🚀 Starting Admin Account Merge...', 'info');
            
            const adminUsername = 'KingKool23';
            const fallbackEmail = 'yamasseetechnology@gmail.com';
            
            try {
                // Step 1: Get KingKool23 account
                log('🔍 Finding KingKool23 account...');
                const { data: kingKoolUser, error: kingKoolError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', adminUsername)
                    .single();
                
                if (kingKoolError || !kingKoolUser) {
                    log('❌ KingKool23 not found: ' + (kingKoolError?.message || 'No user'), 'error');
                    return;
                }
                log('✅ Found KingKool23: ' + kingKoolUser.id, 'success');
                
                // Step 2: Check for email account
                log('🔍 Checking for email account...');
                const { data: emailUser } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', fallbackEmail)
                    .single();
                
                if (emailUser && emailUser.id !== kingKoolUser.id) {
                    log('⚠️ Found separate email account: ' + emailUser.id, 'info');
                    
                    // Transfer posts
                    const { data: emailPosts } = await supabaseClient
                        .from('posts')
                        .select('*')
                        .eq('user_id', emailUser.id);
                    
                    if (emailPosts && emailPosts.length > 0) {
                        log(`📦 Transferring ${emailPosts.length} posts...`);
                        await supabaseClient
                            .from('posts')
                            .update({ user_id: kingKoolUser.id, username: adminUsername })
                            .eq('user_id', emailUser.id);
                        log(`✅ Transferred ${emailPosts.length} posts`, 'success');
                    }
                    
                    // Transfer reactions
                    const { data: reactions } = await supabaseClient
                        .from('post_reactions')
                        .select('*')
                        .eq('user_id', emailUser.id);
                    if (reactions?.length > 0) {
                        await supabaseClient
                            .from('post_reactions')
                            .update({ user_id: kingKoolUser.id })
                            .eq('user_id', emailUser.id);
                        log(`✅ Transferred ${reactions.length} reactions`, 'success');
                    }
                    
                    // Transfer comments
                    const { data: comments } = await supabaseClient
                        .from('comments')
                        .select('*')
                        .eq('user_id', emailUser.id);
                    if (comments?.length > 0) {
                        await supabaseClient
                            .from('comments')
                            .update({ user_id: kingKoolUser.id })
                            .eq('user_id', emailUser.id);
                        log(`✅ Transferred ${comments.length} comments`, 'success');
                    }
                    
                    // Delete old account
                    await supabaseClient.from('users').delete().eq('id', emailUser.id);
                    log('✅ Deleted old email account', 'success');
                }
                
                // Fix orphaned posts
                const { data: orphaned } = await supabaseClient
                    .from('posts')
                    .select('*')
                    .or(`username.eq.${adminUsername},username.eq.${fallbackEmail}`);
                
                if (orphaned?.length > 0) {
                    await supabaseClient
                        .from('posts')
                        .update({ user_id: kingKoolUser.id, username: adminUsername })
                        .or(`username.eq.${adminUsername},username.eq.${fallbackEmail}`);
                    log(`✅ Fixed ${orphaned.length} orphaned posts`, 'success');
                }
                
                // Update admin role
                await supabaseClient
                    .from('users')
                    .update({ role: 'admin', email: fallbackEmail })
                    .eq('id', kingKoolUser.id);
                log('✅ Admin permissions updated', 'success');
                
                log('🎉 MERGE COMPLETE!', 'success');
                log('Refresh VibeHub to see changes', 'info');
                
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
