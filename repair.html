<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeHub Emergency Repair</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; text-align: center; padding-top: 50px; }
        .status { margin: 20px; font-size: 1.2rem; color: #ff4757; }
        .btn { background: #9d50bb; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <h1>VibeHub Emergency Reset</h1>
    <p>This will force-clear all cached data, sessions, and service workers.</p>
    <div id="status" class="status">Ready...</div>
    <button class="btn" onclick="performDeepRepair()">START DEEP REPAIR</button>

    <script>
        async function performDeepRepair() {
            const status = document.getElementById('status');
            status.innerText = "Cleaning system...";
            
            try {
                // 1. Clear Storage
                localStorage.clear();
                sessionStorage.clear();
                status.innerText = "Storage cleared. Unregistering workers...";

                // 2. Unregister Service Workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }
                status.innerText = "Workers removed. Purging caches...";

                // 3. Purge Caches
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (let key of keys) {
                        await caches.delete(key);
                    }
                }
                
                status.innerText = "System Cleaned! Redirecting to Pulse...";
                status.style.color = "#2ed573";
                
                setTimeout(() => {
                    window.location.href = './index.html?t=' + Date.now();
                }, 2000);

            } catch (err) {
                status.innerText = "Repair failed: " + err.message;
            }
        }
    </script>
</body>
</html>
